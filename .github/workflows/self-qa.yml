name: Self QA

# Dogfoods the bundled `cloudanalyzer-action` on every internal PR.
# Builds the gitignored public benchmark pack, runs `ca check` via the
# action, posts an idempotent PR comment, and fails when the gate fails.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  qa:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dri libglu1-mesa libegl1 libxrandr2 libxss1 libxcursor1 libxcomposite1 libasound2t64 libxi6 libxtst6 xvfb

      - name: Install CloudAnalyzer for fixture build
        run: |
          python -m pip install --upgrade pip
          pip install -e cloudanalyzer

      - name: Build public benchmark pack fixtures
        run: |
          xvfb-run python scripts/build_public_benchmark_pack.py \
            --output benchmarks/public/stanford-bunny-mini

      - name: Run CloudAnalyzer self-QA
        uses: rsasaki0109/cloudanalyzer-action@v1
        with:
          config: benchmarks/public/stanford-bunny-mini/configs/suite-pass.cloudanalyzer.yaml
          project: cloudanalyzer-self-qa
          marker: cloudanalyzer-self-qa
