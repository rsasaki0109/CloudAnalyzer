name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudanalyzer

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dri libglu1-mesa libegl1 libxrandr2 libxss1 libxcursor1 libxcomposite1 libasound2t64 libxi6 libxtst6 xvfb

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e .[dev]

      - name: Type check
        run: python -m mypy ca/ cloudanalyzer_cli/

      - name: Build public benchmark pack fixtures
        # tests/test_pr_comment.py and tests/test_bundle.py read the
        # `expected/suite-*.summary.json` files from
        # benchmarks/public/stanford-bunny-mini/. That pack is
        # gitignored and regenerated by the public-benchmark-pack
        # workflow, so generate it here before pytest needs it.
        working-directory: .
        run: |
          xvfb-run python scripts/build_public_benchmark_pack.py \
            --output benchmarks/public/stanford-bunny-mini

      - name: Run tests
        run: xvfb-run python -m pytest tests/ -v

      - name: Verify checked-in perception demo
        working-directory: .
        run: |
          python scripts/build_perception_demo.py \
            --output docs/demo/perception \
            --example-root demo_assets/public/rellis3d-frame-000001 \
            --frame 000001
          git diff --exit-code -- docs/demo/perception

      - name: Verify checked-in synthetic-figure8 SLAM benchmark suite
        working-directory: .
        run: |
          python scripts/build_synthetic_slam_suite.py \
            --output benchmarks/slam/synthetic-figure8
          git diff --exit-code -- benchmarks/slam/synthetic-figure8

      - name: Verify checked-in synthetic-room 3DGS demo
        working-directory: .
        run: |
          python scripts/build_synthetic_3dgs_demo.py \
            --output benchmarks/3dgs/synthetic-room
          git diff --exit-code -- benchmarks/3dgs/synthetic-room

      - name: Build package
        run: |
          python -m build
          python -m twine check dist/*
