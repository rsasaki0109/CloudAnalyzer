version: 1
project: localization-mapping-perception
summary_output_json: qa/summary.json

defaults:
  thresholds: [0.05, 0.1, 0.2]
  max_time_delta: 0.05
  report_dir: qa/reports
  json_dir: qa/results

checks:
  - id: mapping-postprocess
    kind: artifact
    source: outputs/map.pcd
    reference: baselines/map_ref.pcd
    gate:
      min_auc: 0.95
      max_chamfer: 0.02

  - id: localization-run
    kind: trajectory
    estimated: outputs/trajectory.csv
    reference: baselines/trajectory_ref.csv
    alignment: rigid
    gate:
      max_ate: 0.5
      max_rpe: 0.2
      max_drift: 1.0
      min_coverage: 0.9

  - id: perception-geometry
    kind: artifact
    source: outputs/reconstruction.pcd
    reference: baselines/reconstruction_ref.pcd
    gate:
      min_auc: 0.95
      max_chamfer: 0.02

  - id: perception-detection
    kind: detection
    estimated: outputs/detections.json
    reference: baselines/detections_ref.json
    thresholds: [0.25, 0.5]
    gate:
      min_map: 0.9
      min_recall: 0.8

  - id: perception-tracking
    kind: tracking
    estimated: outputs/tracks.json
    reference: baselines/tracks_ref.json
    thresholds: [0.5]
    gate:
      min_mota: 0.8
      min_recall: 0.8
      max_id_switches: 2

  - id: integrated-run
    kind: run
    map: outputs/map.pcd
    map_reference: baselines/map_ref.pcd
    trajectory: outputs/trajectory.csv
    trajectory_reference: baselines/trajectory_ref.csv
    alignment: rigid
    gate:
      min_auc: 0.95
      max_chamfer: 0.02
      max_ate: 0.5
      max_rpe: 0.2
      max_drift: 1.0
      min_coverage: 0.9
