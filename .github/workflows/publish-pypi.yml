name: Publish PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudanalyzer

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install "build>=1.2.2" "pkginfo>=1.12.0" "twine>=6.0.0"
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v6
        with:
          name: cloudanalyzer-dist
          path: cloudanalyzer/dist/*

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/cloudanalyzer

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: cloudanalyzer-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
